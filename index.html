<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre Cerci - Research Assistant</title>
    <meta name="description" content="Research Assistant at Atılım University - Signal Processing & Neural Networks">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --secondary-color: #64748b;
            --accent-color: #0ea5e9;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.05" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,106.7C1248,96,1344,96,1392,96L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        .header-card {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: var(--shadow-xl);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            animation: slideDown 0.6s ease-out;
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        .header-content {
            text-align: center;
            position: relative;
        }

        .header-content h1 {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: fadeInUp 0.8s ease-out;
        }

        .header-content .title {
            font-size: 1.3em;
            color: var(--text-light);
            margin-bottom: 15px;
            font-weight: 500;
            animation: fadeInUp 0.9s ease-out;
        }

        .header-content .institution {
            font-size: 1.1em;
            color: var(--secondary-color);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 1s ease-out;
        }

        .institution-icon {
            width: 20px;
            height: 20px;
            fill: var(--accent-color);
        }

        /* Main Content Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Tools Section */
        .tools-section {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 35px;
            box-shadow: var(--shadow-lg);
            animation: slideInLeft 0.7s ease-out;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .section-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-dark);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .tool-card {
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 18px 20px;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-color);
        }

        .tool-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1);
            filter: brightness(0) invert(1);
        }

        .tool-name {
            font-weight: 600;
            font-size: 1em;
            position: relative;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .tool-card:hover .tool-name {
            color: white;
        }

        .tool-badge {
            background: var(--accent-color);
            color: white;
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
            position: relative;
            z-index: 1;
        }

        /* Links Section */
        .links-section {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 35px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.7s ease-out;
        }

        .links-list {
            list-style: none;
        }

        .link-item {
            margin-bottom: 15px;
        }

        .link-button {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-button:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            transform: translateX(5px);
            box-shadow: var(--shadow-md);
        }

        .link-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        /* Footer */
        .footer {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.8s ease-out;
        }

        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-light);
            font-size: 0.95em;
        }

        .footer-divider {
            width: 1px;
            height: 20px;
            background: var(--border-color);
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header-content h1 {
                font-size: 2.5em;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 15px;
            }

            .header-card {
                padding: 30px 20px;
            }

            .header-content h1 {
                font-size: 2em;
            }

            .header-content .title {
                font-size: 1.1em;
            }

            .tools-section,
            .links-section {
                padding: 25px 20px;
            }

            .section-title {
                font-size: 1.5em;
            }

            .footer-content {
                flex-direction: column;
                gap: 10px;
            }

            .footer-divider {
                display: none;
            }
        }
    </style>
</head>

    <script>
        // Set current year

        // Add stagger animation to tool cards
        const toolCards = document.querySelectorAll('.tool-card');
        toolCards.forEach((card, index) => {
            card.style.animationDelay = `${0.7 + index * 0.1}s`;
            card.style.animation = 'fadeInUp 0.5s ease-out forwards';
            card.style.opacity = '0';
        });

        // Add hover effect to links
        const linkButtons = document.querySelectorAll('.link-button');
        linkButtons.forEach((button, index) => {
            button.style.animationDelay = `${0.8 + index * 0.15}s`;
            button.style.animation = 'slideInRight 0.5s ease-out forwards';
            button.style.opacity = '0';
        });
    </script>
