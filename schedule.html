<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Schedule - Emre Cerci</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Theme system (must be in head for FOUC prevention) -->
    <script src="theme.js"></script>

    <style>
        :root {
            /* Theme Variables */
            --bg-gradient: radial-gradient(circle at 50% 0%, #2d3748 0%, #1a202c 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-color: #63b3ed;
            
            --success-color: #68d391;
            --warning-color: #f6ad55;
            --danger-color: #fc8181;
            
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Animated Background --- */
        .floating-shapes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0; pointer-events: none;
        }
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float 25s infinite ease-in-out;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; left: -100px; top: -50px; }
        .shape:nth-child(2) { width: 200px; height: 200px; right: 10%; top: 40%; animation-delay: -5s; }
        .shape:nth-child(3) { width: 150px; height: 150px; left: 20%; bottom: 10%; animation-delay: -10s; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }

        /* --- Layout --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative; z-index: 1;
            padding-bottom: 40px;
        }

        /* --- Back Button --- */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); transform: translateX(-5px); }

        /* --- Dashboard Header --- */
        .dashboard-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .title-card {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 30px; display: flex; flex-direction: column; justify-content: center;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

        /* Status Card */
        .status-card {
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden;
        }
        
        .clock-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 5px;
        }
        .date-display { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 15px; }
        
        .status-badge {
            align-self: flex-start;
            padding: 8px 16px; border-radius: 50px;
            font-weight: 700; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        
        /* Status Variants */
        .status-active { background: rgba(72, 187, 120, 0.2); color: #68d391; border: 1px solid rgba(72, 187, 120, 0.3); }
        .status-busy { background: rgba(99, 179, 237, 0.2); color: #63b3ed; border: 1px solid rgba(99, 179, 237, 0.3); }
        .status-off { background: rgba(160, 174, 192, 0.2); color: #a0aec0; border: 1px solid rgba(160, 174, 192, 0.3); }
        .status-leave { background: rgba(246, 173, 85, 0.2); color: #f6ad55; border: 1px solid rgba(246, 173, 85, 0.3); }

        /* --- Schedule Table --- */
        .table-container {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 20px; overflow-x: auto;
            animation: fadeInUp 0.8s ease-out;
            box-shadow: var(--shadow-soft);
        }

        .schedule-table {
            width: 100%; min-width: 1000px;
            border-collapse: separate; border-spacing: 6px;
        }

        .schedule-table th {
            padding: 15px; text-align: left;
            color: var(--text-secondary); font-weight: 600; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
        }
        .schedule-table th small { display: block; font-size: 0.75rem; opacity: 0.7; margin-top: 4px; }

        .time-col {
            width: 100px; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            color: var(--text-secondary); opacity: 0.8;
            white-space: nowrap;
            line-height: 1.3;
        }
        .time-col .time-end {
            display: block;
            font-size: 0.65rem;
            opacity: 0.6;
        }

        .activity-cell {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px; padding: 8px 10px;
            transition: var(--transition);
            border: 1px solid transparent;
            position: relative;
            vertical-align: middle !important;
            text-align: center;
            height: auto;
        }

        .activity-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            gap: 5px;
        }

        .activity-cell:hover { background: rgba(255, 255, 255, 0.05); }

        /* Content inside cell */
        .activity { font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 4px; color: #1a202c; /* Pastel arka planlarda okunabilirlik için siyah renk */ }
        .location { font-size: 0.8rem; opacity: 0.8; display: flex; align-items: center; gap: 4px; color: #2d3748; }
        
        /* Modifiers */
        .filled-slot {
            /* Background color comes from JS */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 4px solid rgba(0,0,0,0.2);
        }
        
        .leave-day {
            background: repeating-linear-gradient(
                45deg,
                rgba(246, 173, 85, 0.1),
                rgba(246, 173, 85, 0.1) 10px,
                rgba(246, 173, 85, 0.05) 10px,
                rgba(246, 173, 85, 0.05) 20px
            );
            color: var(--warning-color); font-weight: 600; text-align: center;
            font-style: italic;
        }

        /* Current Time Highlight */
        .current-slot {
            position: relative; z-index: 10;
            border: 2px solid var(--accent-color) !important;
            box-shadow: 0 0 15px rgba(99, 179, 237, 0.3) !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 179, 237, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 179, 237, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 179, 237, 0); } }

        /* Error Message if Config Missing */
        #error-banner {
            background: rgba(245, 101, 101, 0.2); color: #feb2b2;
            border: 1px solid #f56565; padding: 15px;
            border-radius: 12px; margin-bottom: 20px;
            display: none; text-align: center; font-weight: 600;
        }

        /* Today column highlight */
        .today-col {
            background: rgba(99, 179, 237, 0.04);
        }
        .schedule-table th.today-header {
            color: var(--accent-color) !important;
            position: relative;
        }
        .schedule-table th.today-header::after {
            content: 'TODAY';
            display: inline-block;
            font-size: 0.55rem;
            background: var(--accent-color);
            color: #1a202c;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Legend */
        .schedule-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 12px 16px;
            margin-top: 16px;
            border-top: 1px solid var(--glass-border);
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-header { grid-template-columns: 1fr; }
            .schedule-table th, .schedule-table td { padding: 8px 6px; }
            .schedule-table { min-width: 800px; }
            .activity { font-size: 0.8rem; }
            .location { font-size: 0.7rem; }
            .time-col { font-size: 0.7rem; width: 80px; }
            .schedule-legend { gap: 10px; }
            .legend-item { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <!-- Navigation -->
        <a href="index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Homepage
        </a>

        <!-- Error Banner (Shows if config is missing) -->
        <div id="error-banner">
            Error: 'schedule-config.js' file not found or empty. Please check the file.
        </div>

        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div class="title-card">
                <h1 class="page-title">Weekly Schedule</h1>
            </div>
            
            <div class="status-card">
                <div>
                    <div class="clock-display" id="clock">--:--:--</div>
                    <div class="date-display" id="date">--</div>
                </div>
                <div id="status-badge" class="status-badge status-off">
                    <span>●</span> Loading...
                </div>
            </div>
        </div>

        <!-- Schedule Table -->
        <div class="table-container">
            <table class="schedule-table">
                <thead id="schedule-head">
                    <!-- JS fills this -->
                </thead>
                <tbody id="schedule-body">
                    <!-- JS fills this -->
                </tbody>
            </table>
            <div class="schedule-legend">
                <div class="legend-item">
                    <span class="legend-dot" style="background: #68d391;"></span> Available
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: #63b3ed;"></span> In Class / Busy
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: #f6ad55;"></span> On Leave
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: #a0aec0;"></span> Off-Duty
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: rgba(99,179,237,0.15); border: 1px solid #63b3ed;"></span> Current Slot
                </div>
            </div>
        </div>
    </div>

    <!-- EXTERNAL CONFIG: Must be in same folder -->
    <script src="schedule-config.js"></script>

    <script>
        // MAIN LOGIC
        const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        document.addEventListener('DOMContentLoaded', () => {
            // Check if window.scheduleData exists (populated by external file)
            if (typeof window.scheduleData === 'undefined') {
                document.getElementById('error-banner').style.display = 'block';
                return; // Stop execution
            }

            // Ensure leaveDays exists
            if (typeof window.leaveDays === 'undefined') {
                window.leaveDays = [];
            }

            generateScheduleTable();
            updateRealtime();
            setInterval(updateRealtime, 1000);
        });

        function getWeekDates() {
            const now = new Date();
            const weekDates = {};
            const dayIndex = now.getDay(); 
            const offset = dayIndex === 0 ? -6 : 1 - dayIndex;

            for (let i = 0; i < 6; i++) {
                const date = new Date(now);
                date.setDate(now.getDate() + offset + i);
                const dayName = days[i];
                const formattedDate = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                weekDates[dayName] = { dateObj: date, formatted: formattedDate };
            }
            return weekDates;
        }
        
        function addMinutesToTimeStr(timeStr, minutesToAdd) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(hours, minutes + minutesToAdd, 0, 0);
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        // Yardımcı Fonksiyon: Aynı dersin kaç blok sürdüğünü hesaplar
        function calculateRowSpan(day, startTime, currentEntry) {
            let span = 1;
            let checkTime = addMinutesToTimeStr(startTime, 30);
            
            // Sonraki slotlara bak: Veri var mı VE aktivite ismi aynı mı VE lokasyon aynı mı?
            while (
                window.scheduleData[day] && 
                window.scheduleData[day][checkTime] && 
                window.scheduleData[day][checkTime].activity === currentEntry.activity &&
                window.scheduleData[day][checkTime].location === currentEntry.location
            ) {
                span++;
                checkTime = addMinutesToTimeStr(checkTime, 30);
            }
            return span;
        }

        function generateScheduleTable() {
            const scheduleHead = document.getElementById('schedule-head');
            const scheduleBody = document.getElementById('schedule-body');
            scheduleHead.innerHTML = ''; // Temizle
            scheduleBody.innerHTML = ''; // Temizle
            
            const weekDates = getWeekDates();

            // 1. Header Row
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th>Time</th>';
            const todayDayName = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
            days.forEach(day => {
                const date = weekDates[day].dateObj;
                const displayDate = `${monthNames[date.getMonth()]} ${date.getDate()}`;
                const isToday = new Date().toDateString() === date.toDateString();
                const todayClass = isToday ? ' today-header' : '';

                headerRow.innerHTML += `
                    <th class="${todayClass}">
                        ${day.charAt(0).toUpperCase() + day.slice(1)}
                        <small>${displayDate}</small>
                    </th>`;
            });
            scheduleHead.appendChild(headerRow);

            // Hangi günün hangi saatlerinde "atlama" (skip) yapacağımızı tutan takipçi
            // Örn: Pazartesi 14:30'da 4'lük bir span varsa, 15:00, 15:30, 16:00 atlanmalı.
            const skipTracker = {};
            days.forEach(day => skipTracker[day] = 0);

            // 2. Body Rows (08:30 to 17:30)
            const startTime = new Date(); startTime.setHours(8, 30, 0, 0);
            const endTime = new Date(); endTime.setHours(17, 30, 0, 0);
            let loopTime = new Date(startTime);

            while (loopTime < endTime) {
                const row = document.createElement('tr');
                const timeStr = loopTime.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                
                // Zaman Sütunu (with time range)
                const endTimeStr = addMinutesToTimeStr(timeStr, 30);
                row.innerHTML = `<td class="time-col">${timeStr}<span class="time-end">— ${endTimeStr}</span></td>`;

                days.forEach((day, index) => {
                    // Eğer bu gün için atlanması gereken bir slot varsa, hücresini oluşturma ve sayacı düş
                    if (skipTracker[day] > 0) {
                        skipTracker[day]--;
                        return; 
                    }

                    const cell = document.createElement('td');
                    const isTodayCol = (day === todayDayName);
                    cell.className = 'activity-cell' + (isTodayCol ? ' today-col' : '');
                    cell.id = `${day}-${timeStr.replace(':', '')}`;
                    
                    // Stagger Animation
                    cell.style.animation = `fadeInUp 0.5s ease-out forwards ${0.1 * index}s`;
                    cell.style.opacity = '0';

                    // Check Leave
                    const dateStr = weekDates[day].formatted;
                    const isLeave = (window.leaveDays && window.leaveDays.includes(dateStr));

                    if (isLeave) {
                        cell.classList.add('leave-day');
                        // Tüm gün izinliyse tek tek yazmak yerine ilk slotta yazsın veya her slotta yazsın
                        // Basitlik için her slotta bırakıyoruz
                        if (timeStr === '08:30') cell.textContent = "On Leave";
                    } else {
                        // Check Schedule Data
                        if (window.scheduleData && window.scheduleData[day]) {
                            const entry = window.scheduleData[day][timeStr];
                            
                            if (entry) {
                                // --- ROWSPAN MANTIĞI ---
                                const spanCount = calculateRowSpan(day, timeStr, entry);
                                
                                if (spanCount > 1) {
                                    cell.setAttribute('rowspan', spanCount);
                                    // Takipçiyi güncelle: (spanCount - 1) kadar sonraki hücreyi atla
                                    skipTracker[day] = spanCount - 1;
                                }

                                cell.classList.add('filled-slot');
                                // Force background color from config
                                if (entry.color) {
                                    cell.style.backgroundColor = entry.color;
                                } else {
                                    cell.style.backgroundColor = '#e2e8f0';
                                }
                                
                                cell.innerHTML = `
                                    <div class="activity-content">
                                        <span class="activity">${entry.activity}</span>
                                        <span class="location">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                            ${entry.location}
                                        </span>
                                    </div>
                                `;
                            }
                        }
                    }
                    row.appendChild(cell);
                });

                scheduleBody.appendChild(row);
                loopTime.setMinutes(loopTime.getMinutes() + 30);
            }
        }
        function updateRealtime() {
            const now = new Date();
            
            // 1. Clock & Date
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB');
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            // 2. Determine Status
            const dayIndex = now.getDay(); // 0=Sun
            const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            const dayName = dayMap[dayIndex];
            const badge = document.getElementById('status-badge');

            // Reset Highlight
            document.querySelectorAll('.current-slot').forEach(el => el.classList.remove('current-slot'));

            // Logic Variables
            const isWeekend = (dayIndex === 0); 
            const hour = now.getHours();
            const min = now.getMinutes();
            const isOffHours = (hour < 8 || (hour === 8 && min < 30) || hour > 17 || (hour === 17 && min >= 30));
            
            const ymd = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            const isLeave = (window.leaveDays && window.leaveDays.includes(ymd));

            // Default State
            let statusText = "Off-Duty";
            let statusClass = "status-off";
            let icon = "💤";

            const isSaturdayOff = (dayName === 'saturday' && (!window.scheduleData.saturday || Object.keys(window.scheduleData.saturday).length === 0));

            if (isLeave) {
                statusText = "On Leave";
                statusClass = "status-leave";
                icon = "🏖️";
            } else if (isWeekend || isOffHours || isSaturdayOff) {
                // Keep default Off-Duty
            } else {
                // Working Hours
                statusText = "Available / Free";
                statusClass = "status-active";
                icon = "✅";

                // Check specific activity
                let slotMin = min < 30 ? '00' : '30';
                const timeKey = String(hour).padStart(2,'0') + ':' + slotMin;
                
                // Highlight Cell
                const cellId = `${dayName}-${timeKey.replace(':','')}`;
                const cell = document.getElementById(cellId);
                if (cell) cell.classList.add('current-slot');

                if (window.scheduleData && window.scheduleData[dayName] && window.scheduleData[dayName][timeKey]) {
                    const act = window.scheduleData[dayName][timeKey];
                    statusText = act.activity; 
                    statusClass = "status-busy";
                    icon = "⛔";
                    
                    if (act.activity.includes("Lunch")) {
                        icon = "🍽️";
                        statusText = "Lunch Break";
                        statusClass = "status-leave";
                    }
                }
            }

            badge.className = `status-badge ${statusClass}`;
            badge.innerHTML = `<span>${icon}</span> ${statusText}`;
        }
    </script>
</body>
</html>
