<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Schedule - Emre Cerci</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Theme system (must be in head for FOUC prevention) -->
    <script src="theme.js"></script>

    <style>
        :root {
            /* Theme Variables */
            --bg-gradient: radial-gradient(circle at 50% 0%, #2d3748 0%, #1a202c 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-color: #63b3ed;
            
            --success-color: #68d391;
            --warning-color: #f6ad55;
            --danger-color: #fc8181;
            
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Animated Background --- */
        .floating-shapes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0; pointer-events: none;
        }
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float 25s infinite ease-in-out;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; left: -100px; top: -50px; }
        .shape:nth-child(2) { width: 200px; height: 200px; right: 10%; top: 40%; animation-delay: -5s; }
        .shape:nth-child(3) { width: 150px; height: 150px; left: 20%; bottom: 10%; animation-delay: -10s; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }

        /* --- Layout --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative; z-index: 1;
            padding-bottom: 40px;
        }

        /* --- Back Button --- */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); transform: translateX(-5px); }

        /* --- Dashboard Header --- */
        .dashboard-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .title-card {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 30px; display: flex; flex-direction: column; justify-content: center;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

        /* Status Card */
        .status-card {
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; overflow: hidden;
        }
        
        .clock-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem; font-weight: 700; color: var(--text-primary);
            margin-bottom: 5px;
        }
        .date-display { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 15px; }
        
        .status-badge {
            align-self: flex-start;
            padding: 8px 16px; border-radius: 50px;
            font-weight: 700; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: var(--transition);
        }
        
        /* Status Variants */
        .status-active { background: rgba(72, 187, 120, 0.2); color: #68d391; border: 1px solid rgba(72, 187, 120, 0.3); }
        .status-busy { background: rgba(99, 179, 237, 0.2); color: #63b3ed; border: 1px solid rgba(99, 179, 237, 0.3); }
        .status-off { background: rgba(160, 174, 192, 0.2); color: #a0aec0; border: 1px solid rgba(160, 174, 192, 0.3); }
        .status-leave { background: rgba(246, 173, 85, 0.2); color: #f6ad55; border: 1px solid rgba(246, 173, 85, 0.3); }

        /* --- Schedule Table --- */
        .table-container {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 20px; overflow-x: auto;
            animation: fadeInUp 0.8s ease-out;
            box-shadow: var(--shadow-soft);
        }

        .schedule-table {
            width: 100%; min-width: 1000px;
            border-collapse: separate; border-spacing: 6px;
        }

        .schedule-table th {
            padding: 15px; text-align: left;
            color: var(--text-secondary); font-weight: 600; text-transform: uppercase;
            font-size: 0.85rem; letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
        }
        .schedule-table th small { display: block; font-size: 0.75rem; opacity: 0.7; margin-top: 4px; }

        .time-col {
            width: 100px; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            color: var(--text-secondary); opacity: 0.8;
            white-space: nowrap;
            line-height: 1.3;
        }
        .time-col .time-end {
            display: block;
            font-size: 0.65rem;
            opacity: 0.6;
        }

        .activity-cell {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px; padding: 8px 10px;
            transition: var(--transition);
            border: 1px solid transparent;
            position: relative;
            vertical-align: middle !important;
            text-align: center;
            height: auto;
        }

        .activity-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            gap: 5px;
        }

        .activity-cell:hover { background: rgba(255, 255, 255, 0.05); }

        /* Content inside cell */
        .activity { font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 4px; color: #1a202c; /* Pastel arka planlarda okunabilirlik için siyah renk */ }
        .location { font-size: 0.8rem; opacity: 0.8; display: flex; align-items: center; gap: 4px; color: #2d3748; }
        
        /* Modifiers */
        .filled-slot {
            /* Background color comes from JS */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-left: 4px solid rgba(0,0,0,0.2);
        }
        
        .leave-day {
            background: repeating-linear-gradient(
                45deg,
                rgba(246, 173, 85, 0.1),
                rgba(246, 173, 85, 0.1) 10px,
                rgba(246, 173, 85, 0.05) 10px,
                rgba(246, 173, 85, 0.05) 20px
            );
            color: var(--warning-color); font-weight: 600; text-align: center;
            font-style: italic;
        }

        /* Current Time Highlight */
        .current-slot {
            position: relative; z-index: 10;
            border: 2px solid var(--accent-color) !important;
            box-shadow: 0 0 15px rgba(99, 179, 237, 0.3) !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 179, 237, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 179, 237, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 179, 237, 0); } }

        /* Error Message if Config Missing */
        #error-banner {
            background: rgba(245, 101, 101, 0.2); color: #feb2b2;
            border: 1px solid #f56565; padding: 15px;
            border-radius: 12px; margin-bottom: 20px;
            display: none; text-align: center; font-weight: 600;
        }

        /* Today column highlight */
        .today-col {
            background: rgba(99, 179, 237, 0.04);
        }
        .schedule-table th.today-header {
            color: var(--accent-color) !important;
            position: relative;
        }
        .schedule-table th.today-header::after {
            content: 'TODAY';
            display: inline-block;
            font-size: 0.55rem;
            background: var(--accent-color);
            color: #1a202c;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Legend (auto-generated from categories) */
        .schedule-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 12px 16px;
            margin-top: 16px;
            border-top: 1px solid var(--glass-border);
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* Event duration label */
        .event-duration {
            font-size: 0.65rem;
            opacity: 0.7;
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- Leave Screen --- */
        body.leave-mode,
        body.leave-mode * {
            cursor: default !important;
            user-select: none;
            -webkit-user-select: none;
        }
        .leave-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }
        .leave-screen > * {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .leave-screen.active > * {
            opacity: 1;
            transform: translateY(0);
        }
        .leave-screen > :nth-child(1) { transition-delay: 0.1s; }
        .leave-screen > :nth-child(2) { transition-delay: 0.3s; }
        .leave-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .leave-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        /* Glitch effect */
        .glitch {
            position: relative;
            display: inline-block;
            color: var(--text-primary);
        }
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .glitch {
            animation: glitch-shake 22s infinite steps(1, end) !important;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 #ff3860;
            clip-path: inset(0 0 100% 0);
            animation: glitch-r 22s infinite steps(1, end) !important;
        }
        .glitch::after {
            left: -2px;
            text-shadow: 1px 0 #00d1ff;
            clip-path: inset(0 0 100% 0);
            animation: glitch-c 22s infinite steps(1, end) !important;
            animation-delay: 0.05s !important;
        }
        /* 22s sequence: small bursts at 14%, 32%, 78%, 92%; HEAVY meltdown at 50-56% */
        @keyframes glitch-r {
            /* calm */
            0%, 13%   { clip-path: inset(0 0 100% 0); }
            /* small burst 1 (~14%) */
            14%       { clip-path: inset(20% 0 65% 0); }
            14.7%     { clip-path: inset(60% 0 30% 0); }
            15.4%     { clip-path: inset(0 0 100% 0); }
            /* calm */
            16%, 31%  { clip-path: inset(0 0 100% 0); }
            /* small burst 2 (~32%) */
            32%       { clip-path: inset(45% 0 40% 0); }
            32.7%     { clip-path: inset(0 0 100% 0); }
            33.4%     { clip-path: inset(75% 0 10% 0); }
            34%, 49%  { clip-path: inset(0 0 100% 0); }
            /* HEAVY MELTDOWN (50-56%) — rapid chaos */
            50%       { clip-path: inset(10% 0 80% 0); }
            50.5%     { clip-path: inset(70% 0 15% 0); }
            51%       { clip-path: inset(35% 0 50% 0); }
            51.5%     { clip-path: inset(85% 0 5% 0); }
            52%       { clip-path: inset(5% 0 90% 0); }
            52.5%     { clip-path: inset(55% 0 30% 0); }
            53%       { clip-path: inset(25% 0 65% 0); }
            53.5%     { clip-path: inset(75% 0 10% 0); }
            54%       { clip-path: inset(45% 0 45% 0); }
            54.5%     { clip-path: inset(15% 0 75% 0); }
            55%       { clip-path: inset(65% 0 20% 0); }
            55.5%     { clip-path: inset(0 0 100% 0); }
            56%       { clip-path: inset(40% 0 55% 0); }
            /* aftershock */
            57%, 77%  { clip-path: inset(0 0 100% 0); }
            /* small burst 3 (~78%) */
            78%       { clip-path: inset(55% 0 35% 0); }
            78.7%     { clip-path: inset(20% 0 70% 0); }
            79.4%     { clip-path: inset(0 0 100% 0); }
            80%, 91%  { clip-path: inset(0 0 100% 0); }
            /* small burst 4 (~92%) */
            92%       { clip-path: inset(35% 0 55% 0); }
            92.7%     { clip-path: inset(0 0 100% 0); }
            93.4%     { clip-path: inset(70% 0 15% 0); }
            94%, 100% { clip-path: inset(0 0 100% 0); }
        }
        @keyframes glitch-c {
            0%, 13%   { clip-path: inset(0 0 100% 0); }
            14%       { clip-path: inset(70% 0 20% 0); }
            14.7%     { clip-path: inset(15% 0 75% 0); }
            15.4%     { clip-path: inset(0 0 100% 0); }
            16%, 31%  { clip-path: inset(0 0 100% 0); }
            32%       { clip-path: inset(10% 0 80% 0); }
            32.7%     { clip-path: inset(0 0 100% 0); }
            33.4%     { clip-path: inset(50% 0 35% 0); }
            34%, 49%  { clip-path: inset(0 0 100% 0); }
            /* meltdown */
            50%       { clip-path: inset(60% 0 25% 0); }
            50.5%     { clip-path: inset(20% 0 70% 0); }
            51%       { clip-path: inset(80% 0 10% 0); }
            51.5%     { clip-path: inset(40% 0 50% 0); }
            52%       { clip-path: inset(70% 0 15% 0); }
            52.5%     { clip-path: inset(10% 0 85% 0); }
            53%       { clip-path: inset(50% 0 35% 0); }
            53.5%     { clip-path: inset(25% 0 65% 0); }
            54%       { clip-path: inset(75% 0 10% 0); }
            54.5%     { clip-path: inset(40% 0 50% 0); }
            55%       { clip-path: inset(5% 0 90% 0); }
            55.5%     { clip-path: inset(60% 0 25% 0); }
            56%       { clip-path: inset(20% 0 70% 0); }
            57%, 77%  { clip-path: inset(0 0 100% 0); }
            78%       { clip-path: inset(15% 0 70% 0); }
            78.7%     { clip-path: inset(50% 0 35% 0); }
            79.4%     { clip-path: inset(0 0 100% 0); }
            80%, 91%  { clip-path: inset(0 0 100% 0); }
            92%       { clip-path: inset(60% 0 25% 0); }
            92.7%     { clip-path: inset(0 0 100% 0); }
            93.4%     { clip-path: inset(20% 0 70% 0); }
            94%, 100% { clip-path: inset(0 0 100% 0); }
        }
        /* Subtle horizontal jitter on the parent during the heavy meltdown only */
        @keyframes glitch-shake {
            0%, 49%, 57%, 100% { transform: translate(0, 0); }
            50%   { transform: translate(-3px, 1px); }
            50.5% { transform: translate(2px, -1px); }
            51%   { transform: translate(-2px, 0); }
            51.5% { transform: translate(3px, 1px); }
            52%   { transform: translate(-1px, -2px); }
            52.5% { transform: translate(2px, 0); }
            53%   { transform: translate(-3px, 1px); }
            53.5% { transform: translate(1px, -1px); }
            54%   { transform: translate(-2px, 1px); }
            54.5% { transform: translate(2px, 0); }
            55%   { transform: translate(0, -1px); }
            55.5% { transform: translate(-1px, 1px); }
            56%   { transform: translate(0, 0); }
        }

        /* Click glitch artifact — small, transient burst at cursor */
        .click-glitch {
            position: fixed;
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            text-shadow: 2px 0 #ff3860, -2px 0 #00d1ff;
            z-index: 9999;
            --rot: 0deg;
            animation: click-glitch-anim 0.55s steps(1, end) forwards;
        }
        @keyframes click-glitch-anim {
            0%   { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(0.7); text-shadow: 6px 0 #ff3860, -6px 0 #00d1ff; }
            15%  { opacity: 1; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1.4) skewX(-10deg); text-shadow: 6px 0 #ff3860, -6px 0 #00d1ff; }
            35%  { opacity: 1; transform: translate(-46%, -52%) rotate(var(--rot)) scaleX(0.8) skewX(8deg); text-shadow: -4px 0 #ff3860, 4px 0 #00d1ff; }
            55%  { opacity: 1; transform: translate(-54%, -48%) rotate(var(--rot)) scaleX(1.15) skewX(-3deg); text-shadow: 5px 0 #ff3860, -5px 0 #00d1ff; }
            75%  { opacity: 0.85; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1) skewX(0); text-shadow: 2px 0 #ff3860, -2px 0 #00d1ff; }
            90%  { opacity: 0.4; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1.05); }
            100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scaleX(1); }
        }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-header { grid-template-columns: 1fr; }
            .schedule-table th, .schedule-table td { padding: 8px 6px; }
            .schedule-table { min-width: 800px; }
            .activity { font-size: 0.8rem; }
            .location { font-size: 0.7rem; }
            .time-col { font-size: 0.7rem; width: 80px; }
            .schedule-legend { gap: 10px; }
            .legend-item { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <!-- Navigation -->
        <a href="index.html" class="back-btn" id="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Homepage
        </a>

        <!-- Error Banner (Shows if config is missing) -->
        <div id="error-banner">
            Error: 'schedule-config.js' file not found or empty. Please check the file.
        </div>

        <!-- Leave Screen (shown when scheduleEnabled = false) -->
        <div class="leave-screen" id="leave-screen">
            <div class="leave-title glitch" data-text="Currently on leave">Currently on leave</div>
            <div class="leave-subtitle">The schedule is not available at this time.</div>
        </div>

        <!-- Dashboard Header -->
        <div class="dashboard-header" id="dashboard-header">
            <div class="title-card">
                <h1 class="page-title">Weekly Schedule</h1>
            </div>
            
            <div class="status-card">
                <div>
                    <div class="clock-display" id="clock">--:--:--</div>
                    <div class="date-display" id="date">--</div>
                </div>
                <div id="status-badge" class="status-badge status-off">
                    <span>●</span> Loading...
                </div>
            </div>
        </div>

        <!-- Schedule Table -->
        <div class="table-container" id="table-container">
            <table class="schedule-table">
                <thead id="schedule-head">
                    <!-- JS fills this -->
                </thead>
                <tbody id="schedule-body">
                    <!-- JS fills this -->
                </tbody>
            </table>
            <div class="schedule-legend" id="schedule-legend">
                <!-- Auto-generated from categories -->
            </div>
        </div>
    </div>

    <!-- EXTERNAL CONFIG: Must be in same folder -->
    <script src="schedule-config.js"></script>

    <script>
        // ─── MAIN LOGIC (Event-based schedule) ───
        const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        // Time helpers
        function timeToMinutes(str) {
            const [h, m] = str.split(':').map(Number);
            return h * 60 + m;
        }
        function minutesToTime(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        }
        function formatDuration(startMin, endMin) {
            const diff = endMin - startMin;
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            if (h === 0) return m + 'min';
            if (m === 0) return h + 'h';
            return h + 'h ' + m + 'min';
        }

        // Get category color (with fallback)
        function getCategoryColor(cat) {
            if (window.scheduleCategories && window.scheduleCategories[cat]) {
                return window.scheduleCategories[cat].color;
            }
            return '#94a3b8'; // fallback gray
        }

        // Find event at a specific time for a given day
        function findEventAt(day, minutes) {
            if (!window.scheduleData || !window.scheduleData[day]) return null;
            const events = window.scheduleData[day];
            for (const ev of events) {
                const s = timeToMinutes(ev.start);
                const e = timeToMinutes(ev.end);
                if (minutes >= s && minutes < e) return ev;
            }
            return null;
        }

        // Find event that STARTS at a specific slot time
        function findEventStartingAt(day, minutes) {
            if (!window.scheduleData || !window.scheduleData[day]) return null;
            const events = window.scheduleData[day];
            for (const ev of events) {
                if (timeToMinutes(ev.start) === minutes) return ev;
            }
            return null;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.scheduleData === 'undefined') {
                document.getElementById('error-banner').style.display = 'block';
                return;
            }

            // Leave mode: hide everything, show leave screen
            if (window.scheduleEnabled === false) {
                document.body.classList.add('leave-mode');

                var pickerBtn = document.getElementById('theme-picker-btn');
                var pickerPanel = document.getElementById('theme-picker-panel');
                if (pickerBtn) pickerBtn.style.display = 'none';
                if (pickerPanel) pickerPanel.style.display = 'none';

                document.getElementById('back-btn').style.display = 'none';
                document.getElementById('dashboard-header').style.display = 'none';
                document.getElementById('table-container').style.display = 'none';
                var ls = document.getElementById('leave-screen');
                ls.style.display = 'flex';
                requestAnimationFrame(function() { ls.classList.add('active'); });

                // Click anywhere → spawn a small, transient glitch artifact
                var glitchChars = ['▓','▒','░','█','╳','╱','╲','╋','╬','◉','◇','◈','▪','▫','◢','◣','◤','◥','▚','▞'];
                function spawnClickGlitch(x, y) {
                    var len = 3 + Math.floor(Math.random() * 4);
                    var text = '';
                    for (var i = 0; i < len; i++) {
                        text += glitchChars[Math.floor(Math.random() * glitchChars.length)];
                    }
                    var g = document.createElement('div');
                    g.className = 'click-glitch';
                    g.textContent = text;
                    g.style.left = x + 'px';
                    g.style.top = y + 'px';
                    g.style.setProperty('--rot', (Math.random() * 16 - 8).toFixed(1) + 'deg');
                    document.body.appendChild(g);
                    setTimeout(function() { g.remove(); }, 600);
                }
                window.addEventListener('pointerdown', function(e) {
                    spawnClickGlitch(e.clientX, e.clientY);
                });
                return;
            }

            if (typeof window.leaveDays === 'undefined') window.leaveDays = [];
            if (typeof window.scheduleCategories === 'undefined') {
                window.scheduleCategories = { default: { label: 'Event', color: '#94a3b8' } };
            }

            generateLegend();
            generateScheduleTable();
            updateRealtime();
            setInterval(updateRealtime, 1000);
        });

        // ─── Auto-generate legend from categories ───
        function generateLegend() {
            const legend = document.getElementById('schedule-legend');
            const cats = window.scheduleCategories;

            // Add category colors
            for (const key in cats) {
                legend.innerHTML += `
                    <div class="legend-item">
                        <span class="legend-dot" style="background: ${cats[key].color};"></span> ${cats[key].label}
                    </div>`;
            }
            // Add special items
            legend.innerHTML += `
                <div class="legend-item">
                    <span class="legend-dot" style="background: repeating-linear-gradient(45deg, rgba(246,173,85,0.3), rgba(246,173,85,0.3) 3px, rgba(246,173,85,0.1) 3px, rgba(246,173,85,0.1) 6px);"></span> On Leave
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: rgba(99,179,237,0.15); border: 1px solid var(--accent-color, #63b3ed);"></span> Current Slot
                </div>`;
        }

        function getWeekDates() {
            const now = new Date();
            const weekDates = {};
            const dayIndex = now.getDay();
            const offset = dayIndex === 0 ? -6 : 1 - dayIndex;
            for (let i = 0; i < 6; i++) {
                const date = new Date(now);
                date.setDate(now.getDate() + offset + i);
                const dayName = days[i];
                const formattedDate = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
                weekDates[dayName] = { dateObj: date, formatted: formattedDate };
            }
            return weekDates;
        }

        // ─── Schedule table generation ───
        function generateScheduleTable() {
            const scheduleHead = document.getElementById('schedule-head');
            const scheduleBody = document.getElementById('schedule-body');
            scheduleHead.innerHTML = '';
            scheduleBody.innerHTML = '';

            const weekDates = getWeekDates();
            const todayDayName = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];

            // Header
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = '<th>Time</th>';
            days.forEach(day => {
                const date = weekDates[day].dateObj;
                const displayDate = `${monthNames[date.getMonth()]} ${date.getDate()}`;
                const isToday = new Date().toDateString() === date.toDateString();
                const todayClass = isToday ? ' today-header' : '';
                headerRow.innerHTML += `
                    <th class="${todayClass}">
                        ${day.charAt(0).toUpperCase() + day.slice(1)}
                        <small>${displayDate}</small>
                    </th>`;
            });
            scheduleHead.appendChild(headerRow);

            // Skip tracker: how many remaining rows to skip per day (for rowspan)
            const skipTracker = {};
            days.forEach(day => skipTracker[day] = 0);

            // Rows: 30-min slots from 08:30 to 17:30
            const SLOT = 30; // minutes
            const START = timeToMinutes('08:30');
            const END = timeToMinutes('17:30');

            for (let slotMin = START; slotMin < END; slotMin += SLOT) {
                const row = document.createElement('tr');
                const timeStr = minutesToTime(slotMin);
                const endStr = minutesToTime(slotMin + SLOT);

                // Time column
                row.innerHTML = `<td class="time-col">${timeStr}<span class="time-end">— ${endStr}</span></td>`;

                days.forEach((day, index) => {
                    // Skip cells covered by a rowspan
                    if (skipTracker[day] > 0) {
                        skipTracker[day]--;
                        return;
                    }

                    const cell = document.createElement('td');
                    const isTodayCol = (day === todayDayName);
                    cell.className = 'activity-cell' + (isTodayCol ? ' today-col' : '');
                    cell.id = `${day}-${timeStr.replace(':', '')}`;

                    // Stagger animation
                    cell.style.animation = `fadeInUp 0.5s ease-out forwards ${0.1 * index}s`;
                    cell.style.opacity = '0';

                    // Check Leave
                    const dateStr = weekDates[day].formatted;
                    const isLeave = (window.leaveDays && window.leaveDays.includes(dateStr));

                    if (isLeave) {
                        cell.classList.add('leave-day');
                        if (timeStr === '08:30') cell.textContent = "On Leave";
                    } else {
                        // Find event that starts at this slot
                        const event = findEventStartingAt(day, slotMin);

                        if (event) {
                            const evStartMin = timeToMinutes(event.start);
                            const evEndMin = timeToMinutes(event.end);
                            // How many 30-min slots does this event span?
                            const slotSpan = Math.ceil((evEndMin - evStartMin) / SLOT);

                            if (slotSpan > 1) {
                                cell.setAttribute('rowspan', slotSpan);
                                skipTracker[day] = slotSpan - 1;
                            }

                            cell.classList.add('filled-slot');
                            cell.style.backgroundColor = getCategoryColor(event.category);

                            const duration = formatDuration(evStartMin, evEndMin);
                            cell.innerHTML = `
                                <div class="activity-content">
                                    <span class="activity">${event.activity}</span>
                                    <span class="event-duration">${event.start} — ${event.end}</span>
                                    <span class="location">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                        ${event.location}
                                    </span>
                                </div>
                            `;
                        } else if (!findEventAt(day, slotMin)) {
                            // Empty slot (no event covering this time) — leave empty
                        }
                        // If an event covers this slot but doesn't start here, it's handled by rowspan skip
                    }

                    row.appendChild(cell);
                });

                scheduleBody.appendChild(row);
            }
        }

        // ─── Real-time status ───
        function updateRealtime() {
            const now = new Date();

            // Clock & Date
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB');
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            const dayIndex = now.getDay();
            const dayMap = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            const dayName = dayMap[dayIndex];
            const badge = document.getElementById('status-badge');

            // Reset current-slot highlight
            document.querySelectorAll('.current-slot').forEach(el => el.classList.remove('current-slot'));

            const isWeekend = (dayIndex === 0);
            const hour = now.getHours();
            const min = now.getMinutes();
            const nowMinutes = hour * 60 + min;
            const isOffHours = (nowMinutes < timeToMinutes('08:30') || nowMinutes >= timeToMinutes('17:30'));

            const ymd = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const isLeave = (window.leaveDays && window.leaveDays.includes(ymd));

            let statusText = "Off-Duty";
            let statusClass = "status-off";
            let icon = "❇️";

            const isSaturdayOff = (dayName === 'saturday' && (!window.scheduleData.saturday || window.scheduleData.saturday.length === 0));

            if (isLeave) {
                statusText = "On Leave";
                statusClass = "status-leave";
                icon = "❌";
            } else if (isWeekend || isOffHours || isSaturdayOff) {
                // Keep Off-Duty
            } else {
                // Working hours — find current slot time
                const slotMin = min < 30 ? 0 : 30;
                const timeKey = String(hour).padStart(2, '0') + ':' + String(slotMin).padStart(2, '0');
                const cellId = `${dayName}-${timeKey.replace(':', '')}`;
                const cell = document.getElementById(cellId);
                if (cell) cell.classList.add('current-slot');

                // Check if currently in an event
                const currentEvent = findEventAt(dayName, nowMinutes);

                if (currentEvent) {
                    statusText = currentEvent.activity;
                    statusClass = "status-busy";
                    icon = "⛔";

                    if (currentEvent.category === 'break' || currentEvent.activity.toLowerCase().includes('lunch')) {
                        icon = "🍽️";
                        statusText = currentEvent.activity;
                        statusClass = "status-leave";
                    }
                } else {
                    statusText = "Available / Free";
                    statusClass = "status-active";
                    icon = "✅";
                }
            }

            badge.className = `status-badge ${statusClass}`;
            badge.innerHTML = `<span>${icon}</span> ${statusText}`;
        }
    </script>
</body>
