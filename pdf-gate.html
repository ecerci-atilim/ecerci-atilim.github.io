<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Access - Emre Cerci</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Theme system (must be in head for FOUC prevention) -->
    <script src="theme.js"></script>

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #2d3748 0%, #1a202c 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-color: #63b3ed;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .floating-shapes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: 0; pointer-events: none;
        }
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; left: -50px; top: -50px; }
        .shape:nth-child(2) { width: 200px; height: 200px; right: 10%; top: 40%; animation-delay: -5s; }
        .shape:nth-child(3) { width: 150px; height: 150px; left: 30%; bottom: 10%; animation-delay: -10s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        .gate-container {
            position: relative;
            z-index: 1;
            max-width: 420px;
            width: 100%;
        }

        .gate-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: var(--shadow-soft);
            text-align: center;
        }

        [data-theme="academic"] .gate-card,
        [data-theme="dark"] .gate-card {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .gate-icon {
            width: 48px;
            height: 48px;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .gate-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        [data-theme="academic"] .gate-title {
            font-family: Georgia, 'Times New Roman', serif;
        }

        .gate-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .pin-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.15);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: var(--transition);
        }

        [data-theme="academic"] .pin-input {
            background: #f5f3ef;
            color: #1a1a2e;
            border-color: #ddd8d0;
        }

        [data-theme="dark"] .pin-input {
            background: #111;
            color: #e0e0e0;
            border-color: #2a2a2a;
        }

        .pin-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.15);
        }

        .submit-btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--accent-gradient);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .error-msg {
            margin-top: 16px;
            padding: 10px 16px;
            border-radius: 10px;
            background: rgba(245, 101, 101, 0.12);
            border: 1px solid rgba(245, 101, 101, 0.25);
            color: #fc8181;
            font-size: 0.9rem;
            display: none;
        }

        [data-theme="academic"] .error-msg {
            background: rgba(197, 48, 48, 0.06);
            border-color: rgba(197, 48, 48, 0.15);
            color: #c53030;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="gate-container">
        <div class="gate-card">
            <svg class="gate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                <circle cx="12" cy="16" r="1"/>
            </svg>

            <h1 class="gate-title">Restricted Document</h1>
            <p class="gate-desc">
                This document contains personal data protected under KVKK.
                Please enter the access PIN to continue.
            </p>

            <form id="gate-form" onsubmit="return false;">
                <input
                    type="password"
                    class="pin-input"
                    id="pin-field"
                    placeholder="PIN"
                    autocomplete="off"
                    maxlength="20"
                    autofocus
                >
                <button type="submit" class="submit-btn" id="submit-btn">Open Document</button>
            </form>

            <div class="error-msg" id="error-msg">Incorrect PIN. Please try again.</div>

            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Homepage
            </a>
        </div>
    </div>

    <script>
        // PIN is stored as base64 for simple obfuscation (not real security).
        // Default PIN: "mudek" — change this encoded value to update the PIN.
        var ENCODED_PIN = 'bXVkZWs=';

        var form = document.getElementById('gate-form');
        var field = document.getElementById('pin-field');
        var errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', function () {
            check();
        });

        document.getElementById('submit-btn').addEventListener('click', function () {
            check();
        });

        function check() {
            var input = field.value.trim();
            if (!input) return;

            try {
                if (btoa(input) === ENCODED_PIN) {
                    errorMsg.style.display = 'none';
                    window.location.href = 'eemudek0724.pdf';
                } else {
                    showError();
                }
            } catch (e) {
                showError();
            }
        }

        function showError() {
            errorMsg.style.display = 'block';
            field.value = '';
            field.focus();
        }

        field.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                check();
            }
        });
    </script>
</body>
</html>
