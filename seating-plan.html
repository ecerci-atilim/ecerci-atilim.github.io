<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Seating Plan Generator</title>

    <style>
        /* --- EKRAN GÖRÜNÜMÜ (SCREEN STYLES) --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }
        h1, h2 {
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
            margin-top: 0;
        }
        h2 { margin-top: 30px; }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .input-group, .mode-group { display: flex; flex-direction: column; gap: 8px; }
        
        .meta-data-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            margin-bottom: 15px;
        }
        .full-width { grid-column: span 2; }
        
        label, .group-label { display: block; font-weight: 600; color: #555; }
        input[type="text"], input[type="time"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .classroom-checkbox-container {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            background-color: #fff;
        }
        .checkbox-item { display: block; margin-bottom: 8px; }
        .checkbox-item label { cursor: pointer; font-weight: normal; display: inline-flex; align-items: center; gap: 8px; }
        .radio-options label { font-weight: normal; margin-right: 15px; cursor: pointer; }
        .action-group { display: flex; flex-direction: column; gap: 8px; }
        input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .generate-btn, .print-btn {
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            flex: 1;
            text-align: center;
        }
        .generate-btn { background-color: #27ae60; flex-basis: 100%; }
        .generate-btn:hover { background-color: #229954; }
        
        .print-btn.attendance { background-color: #3498db; }
        .print-btn.attendance:hover { background-color: #2980b9; }
        
        .print-btn.door { background-color: #8e44ad; }
        .print-btn.door:hover { background-color: #7d3c98; }

        .instructions { background-color: #eaf5ff; border-left: 4px solid #3498db; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        #message-area { padding: 15px; border-radius: 6px; margin-bottom: 20px; font-weight: 500; display: none; }
        #message-area.error { background-color: #fbeaea; color: #c0392b; }
        #message-area.warning { background-color: #fef5e7; color: #d35400; }
        
        /* Grid Styles (Screen) */
        .seating-grid { 
            display: grid; 
            gap: 10px; 
            padding: 20px; 
            background-color: #f9f9f9; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            overflow-x: auto; 
            position: relative;
        }
        .board-indicator {
            grid-column: 1 / -1;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 5px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .seat, .grid-gap {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 5px;
            font-size: 14px;
            word-break: break-word;
            position: relative;
            background-color: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .seat.occupied { background-color: #d1e7dd; border-color: #a3cfbb; cursor: grab; }
        .seat.occupied:active { cursor: grabbing; }
        .seat.empty { background-color: #f8f9fa; border-color: #e9ecef; }
        .seat.drag-over { border: 2px dashed #2980b9; background-color: #eaf5ff !important; transform: scale(1.02); }
        .seat.dragging { opacity: 0.5; }
        .grid-gap { background-color: transparent; border: none; }
        .seat-number { font-size: 11px; color: #888; font-weight: bold; align-self: flex-start; margin-bottom: 2px; }
        .student-info { margin: auto 0; pointer-events: none; width: 100%; }
        .student-name { font-weight: 500; }
        .student-id { font-size: 12px; color: #666; margin-top: 4px; }
        .empty-text { margin: auto; color: #aaa; pointer-events: none; }

        .print-signature-area { display: none; } /* Hidden on screen */
        .print-header, .print-footer { display: none; }

        /* --- YAZDIRMA GÖRÜNÜMÜ (PRINT STYLES) --- */
        @media print {
            @page {
                margin: 10mm;
                size: portrait;
            }
            body { 
                background-color: #fff; 
                padding: 0; 
                font-family: 'Times New Roman', Times, serif !important; 
                color: #000;
                width: 100%;
            }
            .app-container { box-shadow: none; border: none; padding: 0; max-width: 100%; margin: 0; width: 100%; }
            .controls-grid, .instructions, h1, #message-area, .generate-btn, .print-btn, .action-group {
                display: none !important;
            }
            
            /* -- KEY FIX: SCROLLBAR REMOVAL -- */
            .seating-grid {
                overflow: visible !important; /* Forces content to expand, removing scrollbars */
                border: 1px solid #000;
                background-color: #fff;
                padding: 0;
                gap: 0;
                display: grid;
                border-right: none; 
                border-bottom: none;
                width: 100%; /* Ensure full width usage */
            }

            .seating-wrapper {
                page-break-after: always;
                page-break-inside: avoid;
                width: 100%;
            }
            .seating-wrapper:last-child { page-break-after: auto; }

            /* Header */
            .print-header {
                display: block;
                border-bottom: 2px solid #000;
                padding-bottom: 10px;
                margin-bottom: 10px;
            }
            .print-header-table { width: 100%; border-collapse: collapse; font-family: 'Times New Roman', serif; }
            .print-header-table td { padding: 4px; vertical-align: top; font-size: 14px; }
            .print-header-title { 
                font-size: 20px; 
                font-weight: bold; 
                text-align: center; 
                margin-bottom: 10px; 
                text-transform: uppercase; 
            }
            
            h2 { display: none; }

            .board-indicator {
                background-color: #ddd;
                color: #000;
                border: 1px solid #000;
                padding: 2px;
                font-size: 12px;
                margin: 0 0 5px 0;
            }
            
            /* Seat Box */
            .seat, .grid-gap {
                border-right: 1px solid #000;
                border-bottom: 1px solid #000;
                border-top: none;
                border-left: none;
                border-radius: 0;
                padding: 4px;
                page-break-inside: avoid;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                min-height: 55px; /* Default height */
            }
            .seat.occupied { background-color: transparent !important; }
            .seat.empty .empty-text { display: none; }
            
            .seat-number { 
                position: static; 
                font-size: 10px; 
                color: #000; 
                margin-bottom: 2px;
            }
            .student-info { margin: 0; text-align: center; }
            .student-name { font-size: 11px; font-weight: bold; line-height: 1.1; }
            .student-id { font-size: 10px; color: #000; margin-top: 1px; }

            /* --- CONDITIONAL DISPLAYS BASED ON PRINT MODE --- */
            
            /* 1. ATTENDANCE MODE (Yoklama Listesi) */
            body.print-attendance .print-signature-area {
                display: block;
                margin-top: auto;
                padding-top: 2px;
            }
            body.print-attendance .signature-line {
                border-bottom: 1px dotted #000;
                height: 10px;
                width: 80%;
                margin: 0 auto;
            }
            body.print-attendance .signature-label {
                font-size: 8px;
                text-align: center;
                display: block;
                margin-top: 1px;
                font-style: italic;
            }
            body.print-attendance .print-footer { display: block; }
            body.print-attendance .proctor-row { display: table-row; }
            body.print-attendance .door-title { display: none; }
            body.print-attendance .attendance-title { display: block; }

            /* 2. DOOR MODE (Kapı Planı) */
            body.print-door .print-signature-area { display: none; } /* No signatures */
            body.print-door .print-footer { display: none; } /* No footer with signature */
            body.print-door .proctor-row { display: none; } /* No proctor info */
            body.print-door .door-title { display: block; }
            body.print-door .attendance-title { display: none; }
            
            /* Make seats smaller in door mode to save space/ink if needed, or keep same */
            body.print-door .seat { justify-content: center; } 
            body.print-door .student-info { margin: auto 0; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Final Seating Plan Generator</h1>
        
        <div class="instructions">
            <strong>How it Works:</strong>
            <ul>
                <li><strong>Drag & Drop:</strong> You can drag students to swap seats.</li>
                <li><strong>Print Attendance:</strong> Includes signatures and proctor field (for circulation).</li>
                <li><strong>Print Door Plan:</strong> No signatures, no proctor info (for posting on door).</li>
            </ul>
        </div>

        <div id="message-area"></div>

        <div class="controls-grid">
            <!-- Left Column: Inputs -->
            <div class="input-group">
                <div class="meta-data-group">
                    <div>
                        <label>Course Code</label>
                        <input type="text" id="course-code" placeholder="e.g. CS101">
                    </div>
                    <div>
                        <label>Course Name</label>
                        <input type="text" id="course-name" placeholder="e.g. Intro to Algo">
                    </div>
                    <div>
                        <label>Exam Time</label>
                        <input type="text" id="exam-time" placeholder="e.g. 10:00">
                    </div>
                    <div>
                        <label>Proctor (Screen Only)</label>
                        <input type="text" id="proctor-name" placeholder="Instructor Name">
                    </div>
                </div>

                <label class="group-label">2. Select Classroom(s)</label>
                <div id="classroom-checkbox-container" class="classroom-checkbox-container"></div>
            </div>

            <!-- Right Column: Settings & Actions -->
            <div>
                <div class="mode-group">
                    <label class="group-label">1. Choose Seating Mode</label>
                    <div class="radio-options">
                        <label><input type="radio" name="seatingMode" value="normal" checked> Normal Capacity</label>
                        <label><input type="radio" name="seatingMode" value="exam"> Exam Capacity</label>
                    </div>
                </div>
                
                <div class="action-group" style="margin-top: 20px;">
                    <label for="student-list-upload">3. Upload Student List (.csv)</label>
                    <input type="file" id="student-list-upload" accept=".csv, .txt">
                    
                    <button id="generate-btn" class="generate-btn">Generate Plan</button>
                    
                    <div class="btn-group" id="print-group" style="display:none;">
                        <button id="print-attendance-btn" class="print-btn attendance">Print Attendance Sheet</button>
                        <button id="print-door-btn" class="print-btn door">Print Door Plan</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="seating-plan-output"></div>
    </div>

    <script>
        // --- 1. DATABASE AND DOM REFERENCES ---
        const classroomsDB = [ { id: '1003', name: 'Room 1003', capacity: 84, examCapacity: 28, cols: 10, rows: 9 }, { id: '1009', name: 'Room 1009', capacity: 84, examCapacity: 28, cols: 10, rows: 9 }, { id: '1015', name: 'Room 1015', capacity: 60, examCapacity: 20, cols: 8, rows: 8 }, { id: '1017', name: 'Room 1017', capacity: 63, examCapacity: 24, cols: 6, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '1019', name: 'Room 1019', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '1023', name: 'Room 1023', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '1024', name: 'Room 1024', capacity: 132, examCapacity: 44, cols: 4, isIrregular: true, colSeats: [11, 11, 11, 11] }, { id: '1025', name: 'Room 1025', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '1026II', name: 'Room 1026II', capacity: 84, examCapacity: 28, cols: 4, isIrregular: true, colSeats: [7, 7, 7, 7] }, { id: '1027', name: 'Room 1027', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [7, 7, 7, 7] }, { id: '1029', name: 'Room 1029', capacity: 111, examCapacity: 37, cols: 4, isIrregular: true, colSeats: [6, 11, 10, 10] }, { id: '2003', name: 'Room 2003', capacity: 63, examCapacity: 21, cols: 8, rows: 8 }, { id: '2009', name: 'Room 2009', capacity: 63, examCapacity: 24, cols: 8, rows: 8 }, { id: '2015', name: 'Room 2015', capacity: 70, examCapacity: 28, cols: 9, rows: 8 }, { id: '2017', name: 'Room 2017', capacity: 84, examCapacity: 28, cols: 4, isIrregular: true, colSeats: [7, 7, 7, 7] }, { id: '2019', name: 'Room 2019', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2023', name: 'Room 2023', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2025', name: 'Room 2025', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2027', name: 'Room 2027', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2029', name: 'Room 2029', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2031', name: 'Room 2031', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2035', name: 'Room 2035', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: '2043', name: 'Room 2043', capacity: 60, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: 'B1003', name: 'Room B1003', capacity: 56, examCapacity: 28, cols: 8, rows: 7 }, { id: 'B1006', name: 'Room B1006', capacity: 96, examCapacity: 32, cols: 4, isIrregular: true, colSeats: [8, 8, 8, 8] }, { id: 'B1007', name: 'Room B1007', capacity: 48, examCapacity: 24, cols: 4, isIrregular: true, colSeats: [6, 6, 6, 6] }, { id: 'B1008', name: 'Room B1008', capacity: 96, examCapacity: 32, cols: 4, isIrregular: true, colSeats: [8, 8, 8, 8] }, { id: 'B1010', name: 'Room B1010', capacity: 96, examCapacity: 32, cols: 4, isIrregular: true, colSeats: [8, 8, 8, 8] }, { id: 'B1012', name: 'Room B1012', capacity: 96, examCapacity: 32, cols: 4, isIrregular: true, colSeats: [8, 8, 8, 8] }, { id: 'B1014', name: 'Room B1014', capacity: 96, examCapacity: 32, cols: 4, isIrregular: true, colSeats: [8, 8, 8, 8] }, { id: 'B1015', name: 'Room B1015', capacity: 56, examCapacity: 24, cols: 8, rows: 7 }, { id: 'B1017', name: 'Room B1017', capacity: 56, examCapacity: 28, cols: 8, rows: 7 }, { id: 'B1019', name: 'Room B1019', capacity: 25, examCapacity: 10, cols: 5, rows: 5 }, { id: 'B1023', name: 'Room B1023', capacity: 25, examCapacity: 10, cols: 5, rows: 5 }, { id: 'B1025', name: 'Room B1025', capacity: 25, examCapacity: 10, cols: 5, rows: 5 }, { id: 'B1027', name: 'Room B1027', capacity: 25, examCapacity: 10, cols: 5, rows: 5 }, { id: 'B1029', name: 'Room B1029', capacity: 60, examCapacity: 24, cols: 8, rows: 8 }, { id: 'B1033', name: 'Room B1033', capacity: 60, examCapacity: 24, cols: 8, rows: 8 }, { id: 'B1037', name: 'Room B1037', capacity: 111, examCapacity: 37, cols: 4, isIrregular: true, colSeats: [6, 11, 10, 10] }];

        const studentListUpload = document.getElementById('student-list-upload');
        const classroomContainer = document.getElementById('classroom-checkbox-container');
        const generateBtn = document.getElementById('generate-btn');
        const printGroup = document.getElementById('print-group');
        const printAttendanceBtn = document.getElementById('print-attendance-btn');
        const printDoorBtn = document.getElementById('print-door-btn');
        const seatingPlanOutput = document.getElementById('seating-plan-output');
        const messageArea = document.getElementById('message-area');

        // Inputs
        const courseCodeInput = document.getElementById('course-code');
        const courseNameInput = document.getElementById('course-name');
        const examTimeInput = document.getElementById('exam-time');
        const proctorNameInput = document.getElementById('proctor-name');

        // --- 2. INITIALIZATION ---
        window.onload = () => {
            populateClassroomCheckboxes();
            generateBtn.addEventListener('click', generatePlan);
            
            // Print Logic
            printAttendanceBtn.addEventListener('click', () => {
                document.body.classList.add('print-attendance');
                document.body.classList.remove('print-door');
                window.print();
                // Clean up classes after print dialog closes (approximate)
                // In modern Chrome/Firefox window.print is blocking, so this runs after cancel/print
                document.body.classList.remove('print-attendance');
            });

            printDoorBtn.addEventListener('click', () => {
                document.body.classList.add('print-door');
                document.body.classList.remove('print-attendance');
                window.print();
                document.body.classList.remove('print-door');
            });
        };

        function populateClassroomCheckboxes() {
            classroomsDB.sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }));
            classroomsDB.forEach(room => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'checkbox-item';
                const checkbox = document.createElement('input'); checkbox.type = 'checkbox'; checkbox.id = `room-${room.id}`; checkbox.value = room.id;
                const label = document.createElement('label'); label.htmlFor = `room-${room.id}`; label.textContent = `${room.name} (Normal: ${room.capacity}, Exam: ${room.examCapacity})`;
                itemDiv.appendChild(checkbox); itemDiv.appendChild(label); classroomContainer.appendChild(itemDiv);
            });
        }
        
        // --- 3. CORE LOGIC ---
        function generatePlan() {
            hideMessage();
            seatingPlanOutput.innerHTML = '';
            printGroup.style.display = 'none';

            const seatingMode = document.querySelector('input[name="seatingMode"]:checked').value;
            const getRoomCapacity = (room) => (seatingMode === 'exam' ? room.examCapacity : room.capacity);

            const selectedClassrooms = Array.from(document.querySelectorAll('#classroom-checkbox-container input:checked'))
                .map(cb => classroomsDB.find(room => room.id === cb.value)).filter(Boolean);
            const file = studentListUpload.files[0];

            if (selectedClassrooms.length === 0) return showMessage("Please select at least one classroom.", "error");
            if (!file) return showMessage("Please upload a student list file.", "error");

            const reader = new FileReader();
            reader.onload = (e) => {
                const students = parseStudentList(e.target.result);
                if (students.length === 0) return showMessage("Student list is empty or in the wrong format.", "error");
                
                const totalCapacity = selectedClassrooms.reduce((sum, room) => sum + getRoomCapacity(room), 0);
                if (students.length > totalCapacity) {
                    showMessage(`Warning: ${students.length} students exceeds the total ${seatingMode} capacity of ${totalCapacity}. Not all students will be seated.`, "warning");
                }
                
                const shuffledStudents = shuffleArray(students);
                const studentDistribution = distributeStudentsSequentially(selectedClassrooms, shuffledStudents, getRoomCapacity);
                
                studentDistribution.forEach((studentsForRoom, room) => {
                    renderSinglePlan(room, studentsForRoom, getRoomCapacity(room));
                });

                if (seatingPlanOutput.children.length > 0) {
                    printGroup.style.display = 'flex';
                }
            };
            reader.readAsText(file);
        }

        function distributeStudentsSequentially(classrooms, students, capacityGetter) {
            const distribution = new Map();
            let studentStartIndex = 0;
            for (const room of classrooms) {
                if (studentStartIndex >= students.length) break;
                const roomCapacity = capacityGetter(room);
                const studentsForThisRoom = students.slice(studentStartIndex, studentStartIndex + roomCapacity);
                distribution.set(room, studentsForThisRoom);
                studentStartIndex += roomCapacity;
            }
            return distribution;
        }

        function parseStudentList(csvString) {
            const students = [];
            const lines = csvString.trim().split('\n');
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim()) {
                    const parts = lines[i].split(',');
                    if (parts.length >= 3) students.push({ id: parts[0].trim(), name: parts[1].trim(), surname: parts[2].trim() });
                }
            }
            return students;
        }
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // --- 5. REVISED RENDERING LOGIC ---
        function renderSinglePlan(classroom, studentsInRoom, capacityUsed) {
            const wrapper = document.createElement('div');
            wrapper.className = 'seating-wrapper';

            // --- PRINT HEADER ---
            const printHeader = document.createElement('div');
            printHeader.className = 'print-header';
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('tr-TR');
            // const timeStr = now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});

            printHeader.innerHTML = `
                <div class="print-header-title attendance-title">EXAM ATTENDANCE SHEET (YOKLAMA LİSTESİ)</div>
                <div class="print-header-title door-title">EXAM SEATING PLAN (OTURMA PLANI)</div>
                <table class="print-header-table">
                    <tr>
                        <td><strong>Course:</strong> ${courseCodeInput.value || '_______'} - ${courseNameInput.value || '__________________'}</td>
                        <td style="text-align:right;"><strong>Date:</strong> ${dateStr} - ${examTimeInput.value || '____:____'}</td>
                    </tr>
                    <tr>
                        <td><strong>Classroom:</strong> ${classroom.name}</td>
                        <td class="proctor-row" style="text-align:right;"><strong>Proctor:</strong> ________________________</td>
                    </tr>
                </table>
            `;
            wrapper.appendChild(printHeader);

            // Screen Only Title
            const title = document.createElement('h2');
            title.textContent = `Seating Plan for ${classroom.name}`;
            wrapper.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'seating-grid';
            grid.style.gridTemplateColumns = `repeat(${classroom.cols}, 1fr)`;

            // BOARD INDICATOR
            const board = document.createElement('div');
            board.className = 'board-indicator';
            board.textContent = "BOARD / TAHTA";
            grid.appendChild(board);

            const numRows = classroom.isIrregular ? Math.max(...classroom.colSeats) : classroom.rows;

            const fillingOrder = [];
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < classroom.cols; c++) {
                    const isSeatValid = classroom.isIrregular ? r < classroom.colSeats[c] : true;
                    if (isSeatValid) fillingOrder.push({ r, c });
                }
            }
            const numberingOrder = [];
            for (let c = 0; c < classroom.cols; c++) {
                for (let r = 0; r < numRows; r++) {
                    const isSeatValid = classroom.isIrregular ? r < classroom.colSeats[c] : true;
                    if (isSeatValid) numberingOrder.push({ r, c });
                }
            }
            
            const seatAssignments = new Map(); 
            studentsInRoom.forEach((student, i) => {
                if (i < capacityUsed) {
                    const coords = fillingOrder[i];
                    if (coords) seatAssignments.set(`${coords.r},${coords.c}`, student);
                }
            });

            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < classroom.cols; c++) {
                    const isVisualSeatValid = classroom.isIrregular ? r < classroom.colSeats[c] : true;

                    if (isVisualSeatValid) {
                        const student = seatAssignments.get(`${r},${c}`);
                        const numberIndex = numberingOrder.findIndex(pos => pos.r === r && pos.c === c);
                        const seatNumber = numberIndex + 1;
                        const seatId = `seat-${classroom.id}-${seatNumber}`;

                        const seatDiv = document.createElement('div');
                        seatDiv.classList.add('seat');
                        seatDiv.id = seatId; 
                        seatDiv.innerHTML = `<span class="seat-number">${seatNumber}</span>`;

                        if (student) {
                            seatDiv.classList.add('occupied');
                            seatDiv.draggable = true;
                            seatDiv.innerHTML += generateStudentHtml(student);
                        } else {
                            seatDiv.classList.add('empty');
                            seatDiv.innerHTML += `<div class="empty-text">Empty</div>`;
                            seatDiv.innerHTML += `<div class="print-signature-area" style="visibility:hidden;"><div class="signature-line"></div></div>`;
                        }

                        addDragHandlers(seatDiv);
                        grid.appendChild(seatDiv);
                    } else {
                        grid.appendChild(document.createElement('div')).className = 'grid-gap';
                    }
                }
            }
            wrapper.appendChild(grid);

            // --- PRINT FOOTER (Only for Attendance) ---
            const footer = document.createElement('div');
            footer.className = 'print-footer';
            footer.innerHTML = `
                <div class="notes-section">
                    <strong>Notes / Remarks:</strong>
                </div>
                <div class="signature-section">
                    <div>
                        <strong>Proctor Signature:</strong> ________________________
                    </div>
                </div>
            `;
            wrapper.appendChild(footer);

            seatingPlanOutput.appendChild(wrapper);
        }

        function generateStudentHtml(student) {
            return `
                <div class="student-info" data-id="${student.id}" data-name="${student.name}" data-surname="${student.surname}">
                    <div class="student-name">${student.name} ${student.surname}</div>
                    <div class="student-id">${student.id}</div>
                </div>
                <!-- Signature Area (Logic handled by CSS classes) -->
                <div class="print-signature-area">
                    <div class="signature-line"></div>
                    <span class="signature-label">Signature / İmza</span>
                </div>
            `;
        }

        // --- 6. DRAG AND DROP IMPLEMENTATION ---
        let dragSrcEl = null;

        function addDragHandlers(seat) {
            seat.addEventListener('dragstart', handleDragStart, false);
            seat.addEventListener('dragenter', handleDragEnter, false);
            seat.addEventListener('dragover', handleDragOver, false);
            seat.addEventListener('dragleave', handleDragLeave, false);
            seat.addEventListener('drop', handleDrop, false);
            seat.addEventListener('dragend', handleDragEnd, false);
        }

        function handleDragStart(e) {
            if (!this.classList.contains('occupied')) {
                e.preventDefault(); return;
            }
            this.classList.add('dragging');
            dragSrcEl = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }
        function handleDragEnter(e) { this.classList.add('drag-over'); }
        function handleDragLeave(e) { this.classList.remove('drag-over'); }

        function handleDrop(e) {
            if (e.stopPropagation) e.stopPropagation();

            if (dragSrcEl !== this) {
                const srcWasOccupied = dragSrcEl.classList.contains('occupied');
                const targetWasOccupied = this.classList.contains('occupied');
                
                const srcNumber = dragSrcEl.querySelector('.seat-number').textContent;
                const targetNumber = this.querySelector('.seat-number').textContent;
                
                const getStudentHtml = (el) => {
                    const info = el.querySelector('.student-info');
                    if(info) {
                        return info.outerHTML + `
                            <div class="print-signature-area">
                                <div class="signature-line"></div>
                                <span class="signature-label">Signature / İmza</span>
                            </div>`;
                    }
                    return `<div class="empty-text">Empty</div><div class="print-signature-area" style="visibility:hidden;"><div class="signature-line"></div></div>`;
                };

                const srcContent = getStudentHtml(dragSrcEl);
                const targetContent = getStudentHtml(this);

                dragSrcEl.innerHTML = `<span class="seat-number">${srcNumber}</span>` + targetContent;
                this.innerHTML = `<span class="seat-number">${targetNumber}</span>` + srcContent;

                dragSrcEl.className = 'seat';
                this.className = 'seat';

                if (targetWasOccupied) dragSrcEl.classList.add('occupied'); 
                else dragSrcEl.classList.add('empty');

                if (srcWasOccupied) this.classList.add('occupied');
                else this.classList.add('empty');

                dragSrcEl.draggable = targetWasOccupied;
                this.draggable = srcWasOccupied;
            }
            return false;
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.seat').forEach(seat => seat.classList.remove('drag-over'));
        }

        function showMessage(text, type) {
            messageArea.textContent = text;
            messageArea.className = type;
            messageArea.style.display = 'block';
        }
        function hideMessage() { messageArea.style.display = 'none'; }
    </script>
</body>
